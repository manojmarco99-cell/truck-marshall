<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TM VSOP">
<title>Truck Marshall VSOP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);min-height:100%;}
.navbar{background:#0f3460;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.navbar .back{font-size:1.5rem;cursor:pointer;display:none;padding:0 8px;}
.navbar h1{font-size:1.1rem;flex:1;font-weight:700;}.navbar h1 span{color:#e94560;}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));min-height:0;}
.page.active{display:block;}
.section-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-radius:8px;margin:12px 0 8px;color:#fff;}
.section-label:first-child{margin-top:0;}
.s1{background:#0f3460;}.s2{background:#ff6f00;}.s3{background:#2e7d32;}.s4{background:#e94560;}.s5{background:#6a1b9a;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.menu-card{background:#fff;border:2px solid #ddd;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
.menu-card:active{transform:scale(.96);background:#fef0f2;border-color:#e94560;}
.menu-card .icon{font-size:1.6rem;display:block;margin-bottom:4px;}
.menu-card .name{font-size:.85rem;font-weight:700;color:#333;}
.menu-card .desc{font-size:.68rem;color:#888;margin-top:2px;line-height:1.2;}
.tag{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:4px;color:#fff;}
.tag-d{background:#2196f3;}.tag-p{background:#ff9800;}
.flow-title{font-size:1.3rem;font-weight:800;color:#e94560;margin-bottom:2px;}
.flow-sub{color:#777;font-size:.82rem;margin-bottom:10px;}
.step-card{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid #e94560;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.step-card.decision{border-left-color:#ffc107;background:#fffde7;}
.step-card.info{border-left-color:#2196f3;background:#e3f2fd;}
.step-card.result{border-left-color:#4caf50;background:#e8f5e9;}
.step-card.warning{border-left-color:#ff5722;background:#fbe9e7;}
.step-num{background:#e94560;color:#fff;min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;}
.step-card.decision .step-num{background:#ffc107;color:#000;}
.step-card.info .step-num{background:#2196f3;}
.step-card.result .step-num{background:#4caf50;}
.step-card.warning .step-num{background:#ff5722;}
.step-text{font-size:.88rem;line-height:1.4;font-weight:500;flex:1;}.step-text b{color:#e94560;}
.section-hdr{font-size:.95rem;font-weight:700;color:#0f3460;padding:8px 0;border-bottom:2px solid #e0e0e0;margin-bottom:4px;}
.branch{padding:8px 12px 8px 20px;background:#f5f5f5;border-radius:8px;font-size:.82rem;line-height:1.3;border-left:3px solid #90caf9;margin-bottom:6px;font-weight:500;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:800;font-size:.82rem;}
.badge.zone{background:#0f3460;color:#fff;}.badges-row{display:inline-flex;gap:4px;margin-left:4px;vertical-align:middle;}
.split-col-title{font-size:.9rem;font-weight:700;color:#fff;background:#0f3460;padding:8px 12px;border-radius:8px;text-align:center;margin-bottom:6px;}
.bolla-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bolla-form .full{grid-column:1/-1;}
.bolla-form label{font-size:.75rem;font-weight:700;color:#0f3460;display:block;margin-bottom:2px;}
.bolla-form input,.bolla-form select,.bolla-form textarea{width:100%;padding:10px;border:2px solid #ccc;border-radius:8px;font-size:16px;font-family:inherit;background:#fff;-webkit-appearance:none;appearance:none;}
.bolla-form input:focus,.bolla-form select:focus,.bolla-form textarea:focus{border-color:#e94560;outline:none;}
.bolla-btns{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap;}
.bolla-btns button{padding:12px 24px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;}
.btn-genera{background:#e94560;color:#fff;}.btn-stampa{background:#0f3460;color:#fff;}
.milkrun-warn{background:#e94560;color:#fff;font-size:1rem;font-weight:900;text-align:center;padding:10px;border-radius:8px;margin-bottom:10px;}
.cmr-preview{background:#fff;border:1px solid #ccc;border-radius:8px;padding:16px;margin-top:10px;}
.cmr-preview h3{font-size:.9rem;color:#0f3460;margin-bottom:8px;}
.cmr-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:.82rem;}
.cmr-row span:first-child{color:#888;font-weight:600;}.cmr-row span:last-child{font-weight:700;text-align:right;max-width:60%;}
.cmr-barcode{text-align:center;margin:10px 0;}.cmr-barcode svg{max-width:100%;}
#printFrame{position:absolute;left:-9999px;top:-9999px;width:0;height:0;border:none;}
@media print{
  html,body{display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important;}
  *{display:none!important;}
}
</style>
</head>
<body>
<div class="navbar">
  <div class="back" id="backBtn" onclick="goHome()">&#8249;</div>

</div>
<div class="page active" id="pageMenu"></div>

<iframe id="printFrame"></iframe>

/* === STAMPA CMR — IDENTICA alla versione PC con immagine sfondo === */
function printCMR(){
  var d=window._cmrData;if(!d)return;
  var daH=d.da.replace(/\n/g,'<br>');
  var mitH=mittente.replace(/\n/g,'<br>');

  /* Genera barcode SVG come immagine */
  var barcodeHtml='';
  var svgEl=document.getElementById('barcodeVrid');
  if(svgEl){try{var svgData=new XMLSerializer().serializeToString(svgEl);barcodeHtml='<img src="data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgData)))+'" style="height:36px;">';}catch(e){}}

  /* Costruisci CMR wrap — stesse coordinate della versione PC */
  var cmr='<div class="cmr-wrap" style="background-image:url(\''+BOLLA_IMG+'\');">';
  /* Barcode VRID in alto a destra */
  cmr+='<div class="barcode-vrid">'+barcodeHtml+'</div>';
  /* 16. Carrier */
  cmr+='<div class="f" style="top:23%;left:66%;font-size:9pt;">'+d.ca+'</div>';
  /* 2. Destinazione */
  cmr+='<div class="f" style="top:20%;left:4%;width:44%;text-align:center;font-size:7.6pt;font-weight:400;line-height:1.5;">'+daH+'</div>';
  /* Seal number - cella 22 */
  cmr+='<div class="f" style="top:88.5%;left:28.3%;font-size:7.6pt;">'+d.se+'</div>';
  /* Targa motrice */
  cmr+='<div class="f" style="top:92.5%;left:55%;font-size:7.6pt;">'+d.tc+'</div>';
  /* Targa rimorchio */
  cmr+='<div class="f" style="top:97.8%;left:55%;font-size:7.6pt;">'+d.tl+'</div>';
  /* Goods (merci) + Quantita */
  d.goods.forEach(function(g,i){
    cmr+='<div class="f" style="top:'+(54.5+i*1)+'%;left:40%;font-size:5pt;">'+g.name+'</div>';
    cmr+='<div class="f" style="top:'+(54.5+i*1)+'%;left:19.5%;width:4%;text-align:center;font-size:5pt;">'+g.qty+'</div>';
  });
  /* VRID merci */
  cmr+='<div class="f" style="top:59.7%;left:30%;width:28%;text-align:center;font-size:9pt;">'+d.vr+'</div>';
  /* Data - cella 21 */
  cmr+='<div class="f" style="top:86.4%;left:21.1%;font-size:7.6pt;">'+d.dt+'</div>';
  cmr+='</div>';

  /* Costruisci documento di stampa — 3 copie */
  var printDoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bolla CMR</title>';
  printDoc+='<style>*{margin:0;padding:0;box-sizing:border-box;}body{margin:0;padding:0;background:#fff;}';
  printDoc+='.cmr-wrap{width:190mm;height:277mm;margin:10mm auto;position:relative;overflow:hidden;page-break-after:always;background-size:100% 100%;background-repeat:no-repeat;-webkit-print-color-adjust:exact;print-color-adjust:exact;}';
  printDoc+='.cmr-wrap:last-child{page-break-after:auto;}';
  printDoc+='.cmr-wrap .f{position:absolute;font-family:Arial,sans-serif;font-size:9pt;font-weight:700;color:#000;white-space:pre-line;line-height:1.3;}';
  printDoc+='.cmr-wrap .barcode-vrid{position:absolute;top:2.2%;right:3%;display:flex;flex-direction:column;align-items:center;}';
  printDoc+='@page{size:A4 portrait;margin:0;}</style></head><body>';
  for(var i=0;i<3;i++) printDoc+=cmr;
  printDoc+='</body></html>';

  /* Stampa — apri nuova tab con solo le bolle, poi stampa da lì */
  var blob=new Blob([printDoc],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var win=window.open(url,'_blank');
  if(win){
    win.onload=function(){
      setTimeout(function(){win.print();},600);
    };
    /* Fallback se onload non scatta */
    setTimeout(function(){try{win.print();}catch(e){}},1500);
  }else{
    /* Se popup bloccato, usa location redirect */
    window.location.href=url;
  }
}
